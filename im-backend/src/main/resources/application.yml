server:
  port: 8080

spring:
  application:
    name: im-backend

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/im_chat?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 10000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.im.entity
  configuration:
    map-underscore-to-camel-case: true
    # 演示时关闭SQL日志，调试时可改回 StdOutImpl
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JetCache配置
jetcache:
  statIntervalMinutes: 15
  areaInCacheName: false
  local:
    default:
      type: linkedhashmap
      keyConvertor: fastjson
      limit: 100
  remote:
    default:
      type: redis
      keyConvertor: fastjson
      valueEncoder: java
      valueDecoder: java
      host: localhost
      port: 6379
      password:
      database: 0
      poolConfig:
        minIdle: 5
        maxIdle: 20
        maxTotal: 50

# JWT配置
jwt:
  secret: YourSecretKeyForJWTTokenGeneration2024VeryLongAndSecure
  expiration: 604800000  # 7天（毫秒）
  header: Authorization
  prefix: "Bearer "

# Swagger配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  group-configs:
    - group: '用户模块'
      paths-to-match: '/api/v1/user/**'
      packages-to-scan: com.im.controller
    - group: '好友模块'
      paths-to-match: '/api/v1/friend/**'
      packages-to-scan: com.im.controller
    - group: '聊天模块'
      paths-to-match: '/api/v1/chat/**'
      packages-to-scan: com.im.controller
    - group: '文件模块'
      paths-to-match: '/api/v1/file/**'
      packages-to-scan: com.im.controller
    - group: '群聊模块'
      paths-to-match: '/api/v1/group/**'
      packages-to-scan: com.im.controller

# 日志配置
logging:
  level:
    com.im: debug
    com.im.mapper: debug

# 文件上传配置
# 部署云服务器时改成: http://你的IP:8080/uploads
file:
  upload:
    path: ./uploads
    url-prefix: http://10.192.149.46:8080/uploads
